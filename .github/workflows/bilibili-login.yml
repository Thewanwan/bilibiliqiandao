name: BiliBili Login

on:
  workflow_dispatch:

env:
  ASPNETCORE_ENVIRONMENT: Production
  HUSKY: 0
  Ray_RunTasks: Login
  Ray_Serilog__WriteTo__0__Args__restrictedToMinimumLevel: Debug

jobs:
  login:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore -p:HUSKY=0

      - name: Build
        run: dotnet build --no-restore -c Release -p:HUSKY=0

      - name: Run Login Task
        run: |
          cd ./src/Ray.BiliBiliTool.Console
          dotnet run -c Release --runTasks=Login
